[uc-online]
# 设定要使用的 Steam AppID（例如 730 对应 CS2）
# 默认 480（Spacewar），可改为任意免费多人游戏 AppID
AppID = 480

# OGAppID — 原始 Steam AppID，用于 Steam Overlay 显示正确的游戏名称
# 如果留空或为 0，overlay 会显示 AppID 对应的游戏名（即伪装 ID 的游戏名）
# 设置为真实游戏的 Steam AppID 即可让 overlay 显示正确的游戏信息
OGAppID = 0

# 要启动的游戏可执行文件路径（绝对路径或相对路径）
GameExecutable = 

# 游戏启动参数（可选）
GameArguments = 

# steam_api.dll 所在目录路径（留空则使用 exe 同级目录）
SteamApiDLLPath = 

[Logging]
# 是否启用日志
EnableLogging = false
LogFile = uc_online.log
